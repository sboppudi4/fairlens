databases:
  - name: fairlens-db
    databaseName: fairlens
    user: fairlens
    plan: free

services:
  - type: redis
    name: fairlens-redis
    plan: free
    ipAllowList: []  # private network only

  - type: web
    name: fairlens-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --proxy-headers --forwarded-allow-ips=*
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false  # set in Render dashboard to your frontend URL
      - key: DATABASE_URL
        fromDatabase:
          name: fairlens-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fairlens-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: fairlens-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: fairlens-redis
          type: redis
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_BUCKET_NAME
        sync: false
      - key: AWS_REGION
        value: us-east-1

  - type: worker
    name: fairlens-worker
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        fromService:
          type: web
          name: fairlens-backend
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: fairlens-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fairlens-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: fairlens-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: fairlens-redis
          type: redis
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_BUCKET_NAME
        sync: false
      - key: AWS_REGION
        value: us-east-1

  - type: web
    name: fairlens-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false  # set to https://fairlens-backend.onrender.com in dashboard
