server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compress text assets on the wire. The JS/CSS bundles dominate transfer size,
  # and were previously served uncompressed.
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    application/manifest+json;

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # Hashed build assets are immutable — cache them aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # The HTML shell must never be cached, or clients pin a stale asset manifest.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
